<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculator</h1>

    <div class="container">
        <input type="text" class="inp">

        <div class="button-grid">
            <button class="grey-btn btn1 clr" >AC</button>
            <button class="grey-btn btn2 opr">**</button>
            <button class="grey-btn btn3 del">D</button>
            <button class="orange-btn btn4 opr">/</button>
            <button class="btn5 num" >7</button>
            <button class="btn6 num">8</button>
            <button class="btn7 num">9</button>
            <button class="orange-btn btn8 opr">*</button>
            <button class="btn9 num">4</button>
            <button class="btn10 num">5</button>
            <button class="btn11 num">6</button>
            <button class="orange-btn btn12 opr">-</button>
            <button class="btn13 num">1</button>
            <button class="btn14 num">2</button>
            <button class="btn15 num">3</button>
            <button class="orange-btn btn16 opr">+</button>
            <button class="zero btn17 num">0</button>       
            <button class="btn18 opr">.</button>
            <button class="orange-btn btn19 evl">=</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
